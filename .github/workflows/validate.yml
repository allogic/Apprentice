name: Validate Apprentice

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  assets:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate assets and configuration
        run: python tools/validate_assets.py

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build packaging tools
        run: dotnet build CakeBuild/CakeBuild.csproj --configuration Release
